services:
  - type: web
    name: nmn-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: nmn-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: static
    name: nmn-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false